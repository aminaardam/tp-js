<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title> ajouter une question</title>
    </head>
    <body>
        <h1> ajouter une question a un examen </h1>
        <form id="form-question">
            <input type ="text" id="proprietaire" placeholder="nom de proprietaire" required>
            <input type ="text" id="nom" placeholder="nom de l'examen" required>
            <textarea id="enonce" placeholder="Enonce de la question "></textarea>
            <input type="number" id="duree" placeholder="Duree en secondes">
            <input type="number" id="points" placeholder="points" >
            <div id="propositions"></div>
            <button type="button" id="add-proposition">Ajouter une proposition</button>
            <button type="submit">Ajouter la question</button>


        </form>
        <script src="ajouter-question.js"></script>
    </body>

</html>
